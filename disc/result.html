<!DOCTYPE html> <!--declares this is a html5 document-->
<html lang="en"> <!--ROOT ELEMENT OF THE PAGEhtml documentation encourages files language to be declared as it can help with engine searches and is inhertied by all the elements in the document, considered good practice -->
<head>
  <meta charset="UTF-8"> <!-- this element is declared because, if in the future this test is converted into other languages or special symbols are used within this application the user regardless of location/language is able to see it, this isnt neccessary for this application at this stage but is good to know info in the realm of HTML-->
  <title>DISC Model Personality Tester Your DISC Result</title> <!--Page title declared in the tab, is good for search engines as ultimately all web apps end up on the web, also kind of helps with adveritising/marketing and looks professional as this name displays to the user in the tab, if they have multiple sites opened which provide the same function maybe this application can stand out-->
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="page"> <!--Main container of all elments on the entire page, this will allow the layout to remain consistent through out all html documents in this application -->

    <main class="resultsContainer"> <!--the main element defines the main contents of this HTML document, class is in reference to the css styling which will be applied, class is used again so i can keep all css the same throughout the application and skip any errors which may occur if done individually-->

      <section class="resultCard"> <!--Box that contains everything related to the result-->
        <h1>Your DISC Personality Type</h1>

        <h2 id="resultTitle"></h2> <!--This is an empty place holder but when result is generated JS will populate it-->

        <div id="resultImagesContainer"></div> <!--This element will contain the image, for the user depending on their result "imagesHTML += `<img src="..." class="result-image">`;"JS can show 1 image or 2 depending if result is tied-->

        <p id="resultDescription"></p> <!--element is empty JS will fill it with results from Result.js "resultDescription.innerHTML = "...description...";" JS-->

        <div class="scoreBox"> <!--Container for showing scores -->
          <h3>Your Score Breakdown</h3>
          <p id="scoreBreakdown"></p> <!--JAVASCRIPT will fill this, e.g. dominance 15, Influence 15 ETC-->
        </div>

        <a href="quiz.html" class="retakeButton">Retake Test</a> <!--Linking back to retake test button-->
        <a href="landingpage.html" class="homeButton">Back to Home</a> <!--linking back to index page-->
      </section>

    </main>

    <footer class="footer">
      <hr>
      <p>DISC Model Personality Tester 2026</p>
    </footer>

  </div>

  <script src="result.js"></script> <!--reads data from localStorage, calculates what to display,updates all the elements above-->
</body>
</html>
